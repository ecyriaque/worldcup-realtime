services:
  db:
    image: postgres:16-alpine
    container_name: worldcup_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf

  backend:
    build: ./backend
    container_name: worldcup_backend
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: worldcup_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  cloudflared-backend:
    image: cloudflare/cloudflared:latest
    container_name: worldcup_cloudflared_backend
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN_BACKEND}
    depends_on:
      - backend
    networks:
      - default

  cloudflared-frontend:
    image: cloudflare/cloudflared:latest
    container_name: worldcup_cloudflared_frontend
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN_FRONTEND}
    depends_on:
      - frontend
    networks:
      - default

volumes:
  pgdata:
