version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: worldcup_backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: worldcup
      DB_PASSWORD: worldcup
      DB_NAME: worldcup
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: worldcup_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
